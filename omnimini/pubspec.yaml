name: audio_recorder_app
description: A Flutter app for recording audio and uploading to Supabase
version: 1.0.0+1
environment:
  sdk: '>=3.0.0 <4.0.0'
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  supabase_flutter: ^2.5.0
  record: ^6.0.0
  permission_handler: ^11.3.0
  just_audio: ^0.9.40
  path_provider: ^2.1.3
  web_socket_channel: ^2.4.0
  uuid: ^4.4.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
flutter:
  uses-material-design: true